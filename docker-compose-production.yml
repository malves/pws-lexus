services:
  pws-lexus:
    image: kleekr/jpo-lexus:1.6
    container_name: pws-lexus
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8010
      DB_PATH: /data/leads.db
    volumes:
      - ./leads.db:/data/leads.db
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8010/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - traefik_reverse_proxy

networks:
  traefik_reverse_proxy:
    external: true
